    flex:1; padding:15px 12px;
    background:#FFFBF7; color:#777; border:1.5px solid #ddd;

    letter-spacing:1.2px; text-transform:uppercase;
    transition:all .15s ease;
  }
  .btn-yes {
    flex:1; padding:15px 12px;
    background:#2d2d2d; color:#fff; border:1.5px solid #2d2d2d;
    border-radius:8px; cursor:pointer;

  .btn-no:active:not(:disabled),.btn-yes:active:not(:disabled) { transform:scale(.97); }
  .btn-no:disabled,.btn-yes:disabled { opacity:.3; cursor:not-allowed; }
`;

const shuffle = a => [...a].sort(() => Math.random() - .5);
const clamp = (v, mn=0, mx=100) => Math.max(mn, Math.min(mx, v));

export default function BizReigns() {
  const [phase, setPhase] = useState("select");
  const [biz, setBiz] = useState(null);
  const [stats, setStats] = useState({});
  const [flashMap, setFlashMap] = useState({});
  const [deck, setDeck] = useState([]);
  const [pos, setPos] = useState(0);
  const [cardState, setCardState] = useState("hidden");
  const [result, setResult] = useState(null);
  const [day, setDay] = useState(1);
  const [death, setDeath] = useState(null);
  const [dragX, setDragX] = useState(0);
  const [drag, setDrag] = useState(false);
  const dragStart = useRef(0);
  const tRefs = useRef([]);

  const card = deck.length ? deck[pos % deck.length] : null;

  const addT = (fn, ms) => { const t = setTimeout(fn, ms); tRefs.current.push(t); };
  const clearTs = () => { tRefs.current.forEach(clearTimeout); tRefs.current = []; };

  const makeDeck = () => {
    let cards = [...NORMAL_CARDS];
    const rareCount = Math.ceil(RARE_CARDS.length * 0.6);
    for (let i = 0; i < rareCount; i++) {
      cards.push(RARE_CARDS[Math.floor(Math.random() * RARE_CARDS.length)]);
    }
    return shuffle(cards);
  };

  const go = (b) => {
    clearTs();
    setBiz(b); setStats({...b.stats}); setDeck(makeDeck());
    setPos(0); setDay(1); setDeath(null); setResult(null);
    setDragX(0); setDrag(false); setFlashMap({});
    setPhase("game"); setCardState("hidden");
    addT(() => setCardState("entering"), 80);
    addT(() => setCardState("idle"), 600);
  };

  const choose = (yes) => {
    if (cardState !== "idle") return;
    const out = yes ? card.yes : card.no;
    const ns = {...stats};
    const chg = {};
    Object.entries(out.fx || {}).forEach(([k,v]) => { chg[k]=v; ns[k]=clamp((ns[k]||50)+v); });

    setCardState(yes ? "exitY" : "exitN");
    setDragX(0); setDrag(false);

    let d = null;
    for (const k of SK) {
      if (ns[k] <= 0) {
        const msgs = DEATH[k];
        d = { k, msg: msgs[Math.floor(Math.random()*msgs.length)] };
        break;
      }
    }

    addT(() => {
      setStats(ns);
      setFlashMap(chg);
      setResult({ text: out.res, changes: chg, yes, key: Math.random() });
      if (d) setDeath(d);
      setCardState("hidden");
      setPos(p => p+1);
      setDay(d => d+1);
    }, 420);

    addT(() => setFlashMap({}), 1400);

    if (!d) {
      addT(() => setCardState("entering"), 560);
      addT(() => setCardState("idle"), 1060);
    } else {
      addT(() => setPhase("gameover"), 2600);
    }
  };

  const ds = (x) => { if (cardState !== "idle") return; setDrag(true); dragStart.current = x; };
  const dm = (x) => { if (!drag) return; setDragX(x - dragStart.current); };
  const de = ()  => {
    if (!drag) return; setDrag(false);
    if (dragX > 80) choose(true); else if (dragX < -80) choose(false); else setDragX(0);
  };

  const rot = -2 + dragX * 0.07;
  const cTx = cardState === "hidden"   ? "translateX(110%) rotate(4deg)"
            : cardState === "entering" ? "translateX(0) rotate(0deg)"
            : cardState === "idle"     ? `translateX(${dragX}px) rotate(${rot}deg)`
            : cardState === "exitY"    ? "translateX(120%) rotate(8deg)"
            :                           "translateX(-120%) rotate(-8deg)";
  const cTr = drag ? "none" : "transform .46s cubic-bezier(.25,.46,.45,.94), opacity .38s ease";
  const cOp = (cardState === "exitY" || cardState === "exitN") ? 0 : 1;
  const hint = Math.min(Math.abs(dragX) / 60, 1);
  const btnsActive = cardState === "idle";
  const deathStat = death ? SM[death.k] : null;
  const deathMsg  = death ? death.msg : "";

  const TAGS = { mp:"E-COM", st:"IT", sh:"RETAIL", rs:"F&B" };

  if (phase === "select") return (
    <div style={{minHeight:"100vh",background:"#FFFBF7",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 24px",fontFamily:"'Inter',sans-serif"}}>

            <div key={b.id} className="sel-card" onClick={()=>go(b)}
              style={{background:"white",borderRadius:10,padding:"24px",border:"1px solid #ede9e3",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>

              </div>

        </div>
        <p style={{textAlign:"center",fontSize:12,color:"#ccc",letterSpacing:.5}}>16 обычных ситуаций · 10 редких событий</p>
      </div>
    </div>
  );

  if (phase === "game" && card) return (
    <div style={{minHeight:"100vh",background:"#FFFBF7",display:"flex",flexDirection:"column",alignItems:"center",maxWidth:520,margin:"0 auto",width:"100%",fontFamily:"'Inter',sans-serif"}}
      onMouseMove={e=>dm(e.clientX)} onMouseUp={de} onMouseLeave={de}>
      <style>{CSS}</style>

      {/* Header */}
      <div style={{width:"100%",padding:"18px 24px 14px",borderBottom:"1px solid #ede9e3"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:14}}>
          <div>
            <span style={{fontSize:17,fontWeight:700,fontFamily:"'Lora',serif",color:"#1a1a1a"}}>{biz.name}</span>
            <span style={{fontSize:12,color:"#bbb",marginLeft:8,fontWeight:500}}>{biz.sub}</span>
          </div>
          <span style={{fontSize:12,color:"#bbb",fontWeight:600,letterSpacing:.5}}>День {day}</span>
        </div>
        <div style={{display:"flex",gap:12}}>
          {SK.map(k=>{
            const m=SM[k];const v=stats[k]||0;const danger=v<=20;const chg=flashMap[k];
            return (
              <div key={k} className={chg?(chg>0?"flash-up":"flash-down"):""} style={{flex:1}}>
                <div style={{fontSize:9,fontWeight:600,letterSpacing:.8,textTransform:"uppercase",color:danger?"#c0392b":"#aaa",marginBottom:4}}>{m.label}</div>
                <div style={{height:4,background:"#ede9e3",borderRadius:2,overflow:"hidden"}}>
                  <div className="stat-bar" style={{width:`${v}%`,height:"100%",background:danger?"#c0392b":m.bar,borderRadius:2}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {result && (
        <div className="result-in" style={{width:"100%",padding:"12px 24px",background:"#f9f7f3",borderBottom:"1px solid #ede9e3",display:"flex",alignItems:"flex-start",gap:10}}>
          <div style={{flexShrink:0,background:result.yes?"#e8f5e2":"#fbeaea",borderRadius:4,padding:"3px 9px",marginTop:1}}>
            <span style={{fontWeight:700,color:result.yes?"#3a6b25":"#8b2222",fontSize:10,letterSpacing:1,textTransform:"uppercase"}}>{result.yes?"Да":"Нет"}</span>
          </div>
          <div style={{flex:1}}>
            <p style={{fontSize:13,color:"#555",lineHeight:1.55,marginBottom:6}}>{result.text}</p>
            {Object.entries(result.changes).filter(([,v])=>v!==0).length>0&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {Object.entries(result.changes).filter(([,v])=>v!==0).map(([k,v])=>{
                  const m=SM[k];const up=v>0;
                  return (
                    <span key={k} style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,fontWeight:600,color:"#555",background:"white",border:"1px solid #ede9e3",padding:"2px 8px",borderRadius:4}}>
                      <span style={{width:5,height:5,borderRadius:"50%",background:m.bar,flexShrink:0,display:"inline-block"}}/>
                      {m.label}
                      <span style={{color:up?"#3a6b25":"#8b2222",fontWeight:700}}>{up?"+":""}{v}</span>
                    </span>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      <div style={{position:"relative",flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",width:"100%",padding:"40px 24px",overflow:"visible"}}>
        {["no","yes"].map(side=>{
          const isYes=side==="yes";const show=isYes?dragX>12:dragX<-12;
          return (
            <div key={side} style={{position:"absolute",[isYes?"right":"left"]:"18px",top:"50%",transform:"translateY(-50%)",opacity:show?hint:0,transition:"opacity .08s",pointerEvents:"none"}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:isYes?"#3a6b25":"#8b2222",textAlign:"center"}}>{isYes?"Да →":"← Нет"}</div>
            </div>
          );
        })}

        <div style={{transform:cTx,transition:cTr,opacity:cOp,background:card.clr,width:320,minHeight:220,borderRadius:10,padding:"32px 28px",boxShadow:"0 8px 32px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04)",cursor:cardState==="idle"?"grab":"default",position:"relative",zIndex:4}}
          onMouseDown={e=>ds(e.clientX)} onTouchStart={e=>ds(e.touches[0].clientX)} onTouchMove={e=>{dm(e.touches[0].clientX);e.preventDefault();}} onTouchEnd={de}>
          {card.rare && <div style={{fontSize:9,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"rgba(0,0,0,.35)",borderBottom:"1px solid rgba(0,0,0,.1)",paddingBottom:6,marginBottom:14}}>Редкое событие</div>}
          <div style={{fontFamily:"'Lora',serif",fontWeight:700,fontSize:21,color:"#1a1a1a",lineHeight:1.45}}>{card.text}</div>
        </div>
      </div>

      <div style={{padding:"16px 24px 36px",display:"flex",gap:10,width:"100%",maxWidth:360,opacity:btnsActive?1:0.2,transition:"opacity .25s",pointerEvents:btnsActive?"auto":"none"}}>
        <button className="btn-no" onClick={()=>choose(false)} disabled={!btnsActive}>{card.btnNo || "Нет"}</button>
        <button className="btn-yes" onClick={()=>choose(true)} disabled={!btnsActive}>{card.btnYes || "Да"}</button>
      </div>
    </div>
  );

  const DEATH_SUBTITLES = {
    fin: ["Деньги кончились раньше, чем появились клиенты. Классика.", "Кассовый разрыв. Платить нечем — ни поставщикам, ни людям.", "Потратили всё на рост, а оборотки не хватило даже на аренду.", "Последний транш ушёл на погашение долга. Счёт обнулился.", "Инвесторы вышли, кредиты просрочены. Банкротство.", "Слишком большая скидка слишком многим клиентам. Работали в минус месяцами."],
    ppl: ["Команда ушла к конкуренту — он предложил на 20% больше.", "После конфликта на корпоративе уволилась половина офиса.", "Выгорели все разом. В один день пришло пять заявлений.", "Без HR-системы потеряли счёт кому сколько должны. Люди перестали доверять.", "Единственный человек, кто понимал систему, уехал в другой город.", "Рост без найма — старые сотрудники не вынесли объёма и исчезли.", "Токсичный топ выжил всех вменяемых специалистов за три месяца."],
    rep: ["Один вирусный пост — и 40 тысяч человек решили вас бойкотировать.", "Публичный скандал с клиентом. Скриншоты разлетелись по телеграм-каналам.", "Партнёр рассказал прессе детали вашего провала. Детально.", "Рейтинг упал до 2.1. Новые клиенты читают отзывы — и уходят.", "Бывший сотрудник написал в LinkedIn всё, что думает. Пост набрал 80k просмотров.", "Продукт сравнили с конкурентом в федеральном СМИ. Не в вашу пользу."],
    proc: ["Никто не знает, где договоры. Никто не знает, кто клиенты. Хаос.", "Склад переполнен, CRM пустая, дедлайны пропущены. Всё сломалось одновременно.", "Документы подписывали на коленке — налоговая это заметила.", "Три разных Google-таблицы с разными данными. Никто не знает, какая правильная.", "Новый менеджер не нашёл ни одной инструкции. Сделал всё по-своему.", "Автоматизации нет, людей не хватает, заказы теряются ежедневно.", "ЭДО не настроен — партнёры отказываются работать без электронных документов."],
    gov: ["Внеплановая проверка нашла нарушения за последние три года.", "Забыли сдать отчёт вовремя. Штраф, потом блокировка счёта.", "Работали без нужной лицензии. Регулятор это выяснил в худший момент.", "Налоговая доначислила за серые схемы прошлых владельцев. Вы не знали.", "Трудовая инспекция — жалоба от уволенного сотрудника. Три проверки подряд.", "Ошибка в КЭП — все документы за квартал юридически недействительны.", "Контрагент оказался фирмой-однодневкой. Налоговая пришла к вам."],
  };

  if (phase === "gameover") return (
    <div style={{minHeight:"100vh",background:"#FFFBF7",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",fontFamily:"'Inter',sans-serif"}}>
      <style>{CSS}</style>
      <div style={{width:"100%",maxWidth:460,animation:"goIn .4s ease"}}>

        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:14,color:"#aaa",fontWeight:500,marginBottom:16}}>Вы продержались</div>
          <h1 style={{fontSize:56,fontFamily:"'Lora',serif",fontWeight:700,color:"#1a1a1a",lineHeight:1,marginBottom:24,letterSpacing:"-1px"}}>
            {day-1} {(day-1)===1?"день":(day-1)<5?"дня":"дней"}
          </h1>
          <p style={{fontSize:14,color:"#888",lineHeight:1.65,maxWidth:400,margin:"0 auto"}}>
            {deathMsg}
          </p>
          <div style={{width:36,height:2,background:"#e0d8d0",margin:"20px auto 0"}}/>
        </div>

        {death && OFFERS[death.k] && (
          <div style={{background:"white",border:"1px solid #ede9e3",borderLeft:`3px solid ${OFFERS[death.k].accent}`,borderRadius:"0 8px 8px 0",padding:"20px 20px",marginBottom:20}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:OFFERS[death.k].accent,marginBottom:10}}>Что могло помочь</div>
            <p style={{fontSize:13,color:"#888",lineHeight:1.6,marginBottom:12,fontStyle:"italic"}}>
              {OFFERS[death.k].hook}
            </p>
            <h3 style={{fontSize:16,fontFamily:"'Lora',serif",fontWeight:700,color:"#1a1a1a",marginBottom:6}}>{OFFERS[death.k].title}</h3>
            <p style={{fontSize:13,color:"#777",lineHeight:1.6,marginBottom:16}}>{OFFERS[death.k].text}</p>
            <button style={{padding:"10px 20px",background:OFFERS[death.k].accent,color:"white",border:"none",borderRadius:6,fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:13,cursor:"pointer",letterSpacing:.5}}>
              {OFFERS[death.k].cta} →
            </button>
          </div>
        )}

        <div style={{background:"white",border:"1px solid #ede9e3",borderRadius:8,padding:"16px 18px",marginBottom:24}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#bbb",marginBottom:12}}>Финальные показатели</div>
          {SK.map(k=>{
            const m=SM[k];const v=stats[k]||0;
            return (
              <div key={k} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <span style={{flex:"0 0 88px",color:"#888",fontSize:12,fontWeight:600}}>{m.label}</span>
                <div style={{flex:1,height:4,background:"#f0ebe5",borderRadius:2,overflow:"hidden"}}>
                  <div style={{width:`${v}%`,height:"100%",background:v<=20?"#c0392b":m.bar,borderRadius:2}}/>
                </div>
                <span style={{fontSize:11,color:"#bbb",fontWeight:700,minWidth:22,textAlign:"right"}}>{v}</span>
              </div>
            );
          })}
        </div>

        <div style={{display:"flex",gap:10}}>
          <button className="btn-yes" style={{flex:1}} onClick={()=>go(biz)}>Сыграть снова</button>
          <button className="btn-no" style={{flex:1}} onClick={()=>setPhase("select")}>К выбору бизнеса</button>
        </div>
      </div>
    </div>
  );

  return null;
}
  </script>
</body>
</html>
